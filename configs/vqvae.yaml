data:
  dataset: shapenet55
  data_root: data/ShapeNet55
  pc_dir: shapenet_pc
  n_points: 2048
  train_split: train
  val_split: test

model:
  embed_dim: 384
  num_groups: 64
  group_size: 32
  encoder_depth: 6
  decoder_depth: 6
  num_heads: 6
  codebook_size: 8192

train:
  epochs: 300
  batch_size: 64
  lr: 1e-3
  weight_decay: 0.05
  warmup_epochs: 10
  min_lr: 1e-5

output:
  exp_dir: experiments/vqvae
  save_freq: 50
  log_freq: 10
